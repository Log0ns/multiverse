<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiverse</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e0e0; overflow: hidden; height: 100vh; }
#app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 50px 1fr; height: 100vh; }
header { grid-column: 1 / -1; background: #111827; border-bottom: 1px solid #1f2937; display: flex; align-items: center; padding: 0 16px; gap: 12px; }
header h1 { font-size: 1rem; color: #f9fafb; }
header .status { font-size: 0.75rem; color: #6b7280; margin-left: auto; cursor: pointer; }
#sidebar { background: #111827; border-right: 1px solid #1f2937; display: flex; flex-direction: column; overflow: hidden; }
#sidebar-tabs { display: flex; border-bottom: 1px solid #1f2937; }
#sidebar-tabs button { flex: 1; padding: 8px; background: none; border: none; color: #6b7280; font-size: 0.8rem; cursor: pointer; border-bottom: 2px solid transparent; }
#sidebar-tabs button.active { color: #60a5fa; border-bottom-color: #60a5fa; }
#sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }
.panel { display: none; flex-direction: column; gap: 10px; }
.panel.active { display: flex; }
label { font-size: 0.78rem; color: #9ca3af; }
input, select, textarea { background: #1f2937; border: 1px solid #374151; color: #e0e0e0; padding: 6px 8px; border-radius: 4px; font-size: 0.85rem; font-family: inherit; }
textarea { resize: vertical; min-height: 60px; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; }
button.btn { background: #3b82f6; color: white; border: none; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
button.btn:hover { background: #2563eb; }
button.btn-danger { background: #dc2626; }
button.btn-danger:hover { background: #b91c1c; }
button.btn-secondary { background: #374151; }
button.btn-secondary:hover { background: #4b5563; }
#canvas-wrap { position: relative; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; cursor: grab; }
#tooltip { position: absolute; background: #1f2937; border: 1px solid #374151; padding: 10px; border-radius: 6px; font-size: 0.78rem; max-width: 300px; pointer-events: none; display: none; z-index: 10; line-height: 1.4; }
#detail-panel { position: absolute; top: 10px; right: 10px; width: 320px; max-height: calc(100% - 20px); background: #111827ee; border: 1px solid #374151; border-radius: 8px; padding: 16px; overflow-y: auto; z-index: 5; font-size: 0.8rem; line-height: 1.6; color: #d1d5db; }
#bible-word-bar { position: absolute; top: 10px; right: 340px; background: #111827ee; border: 1px solid #374151; border-radius: 6px; padding: 10px; font-size: 0.75rem; z-index: 6; display: none; max-width: 200px; }
#bible-word-bar .selected-text { color: #e0e0e0; margin-bottom: 6px; word-break: break-word; }
#bible-word-bar button { display: block; width: 100%; margin-top: 4px; }
#detail-panel h3 { color: #60a5fa; font-size: 0.9rem; margin-bottom: 8px; }
.bible-word { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.bible-word:hover { background: #374151; }
#color-key { position: absolute; bottom: 10px; left: 10px; background: #111827ee; border: 1px solid #374151; border-radius: 6px; padding: 10px; font-size: 0.72rem; max-height: 200px; overflow-y: auto; z-index: 5; }
#color-key div { margin: 3px 0; display: flex; align-items: center; gap: 6px; }
#color-key span.swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
#edit-modal { position: fixed; top: 80px; left: calc(50% - 260px); width: 520px; min-width: 300px; min-height: 280px; max-height: 90vh; background: #111827; border: 1px solid #374151; border-radius: 10px; padding: 0; display: none; flex-direction: column; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden; }
#edit-modal.active { display: flex; }
#edit-modal .modal-header { padding: 10px 16px; background: #1f2937; border-bottom: 1px solid #374151; cursor: move; display: flex; align-items: center; justify-content: space-between; border-radius: 10px 10px 0 0; user-select: none; }
#edit-modal .modal-header h2 { font-size: 0.95rem; margin: 0; }
#edit-modal .modal-header button { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 1.1rem; }
#edit-modal .modal-body { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
#edit-modal .chip-area { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
#edit-modal .chip { background: #374151; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; font-size: 0.75rem; }
#edit-modal .chip button { background: none; border: none; color: #f87171; cursor: pointer; font-size: 0.85rem; }
#edit-modal textarea { flex: 1; min-height: 150px; resize: vertical; }
#edit-modal .btn-row { display: flex; gap: 8px; margin-top: 6px; }
#edit-modal .resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; }
.note-list { display: flex; flex-direction: column; gap: 4px; }
.note-item { background: #1f2937; padding: 8px; border-radius: 4px; font-size: 0.78rem; cursor: pointer; border-left: 3px solid #374151; }
.note-item:hover { background: #374151; }
.chapter-nav { display: flex; flex-wrap: wrap; gap: 3px; }
.chapter-nav button { width: 28px; height: 24px; font-size: 0.7rem; padding: 0; background: #1f2937; border: 1px solid #374151; color: #6b7280; border-radius: 3px; cursor: pointer; }
.chapter-nav button.has-notes { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }
.chapter-nav button.selected { background: #3b82f6; color: white; }
#book-nav { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
#book-nav button { padding: 3px 6px; font-size: 0.68rem; background: #1f2937; border: 1px solid #374151; color: #9ca3af; border-radius: 3px; cursor: pointer; }
#book-nav button.active { background: #3b82f6; color: white; }
#book-nav button.book-complete { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Multiverse</h1>
    <span class="status" id="status-bar"></span>
  </header>
  <div id="sidebar">
    <div id="sidebar-tabs">
      <button class="active" data-tab="navigate">Navigate</button>
      <button data-tab="notes">Notes</button>
    </div>
    <div id="sidebar-content">
      <!-- Navigate Panel -->
      <div class="panel active" id="panel-navigate">
        <label>Book</label>
        <div id="book-nav"></div>
        <label>Chapter</label>
        <div class="chapter-nav" id="chapter-nav"></div>
        <div id="chapter-info" style="margin-top:10px;"></div>
        <label style="margin-top:8px;">Key Words in This Chapter</label>
        <div id="keyword-checklist" style="max-height:150px;overflow-y:auto;"></div>
        <button class="btn" id="btn-create-from-keywords" style="margin-top:4px;">Create Notes from Checked</button>
      </div>
      <!-- Notes Panel -->
      <div class="panel" id="panel-notes">
        <label>New Note (linked to ${chapter})</label>
        <input type="text" id="new-note-title" placeholder="Title (shown on graph)">
        <textarea id="new-note-text" placeholder="Write your notes, observations, cross-references..." style="min-height:100px;"></textarea>
        <button class="btn" id="btn-create-note">Create Note</button>
        <button class="btn btn-secondary" id="btn-suggest" style="margin-top:4px;">Suggest Chapters</button>
        <div id="suggestions" style="max-height:150px;overflow-y:auto;"></div>
        <label style="margin-top:8px;">All Notes</label>
        <div class="note-list" id="note-list"></div>
        <button class="btn btn-secondary" id="btn-export-zip" style="margin-top:12px;">Export All as .md (zip)</button>
      </div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="graph"></canvas>
    <div id="tooltip"></div>
    <div id="detail-panel"></div>
    <div id="bible-word-bar"></div>
    <div id="color-key"></div>
  </div>
  <div id="edit-modal"></div>
</div>
<script src="bible-data.js"></script>
<script src="store.js"></script>
<script src="graph.js"></script>
<script src="app.js"></script>
</body>
</html>
